# Stack for Coolify (no bundled Traefik — Coolify handles HTTPS and routing).
# Build context: repository root (same as docker-compose.yml).

version: '3.9'

networks:
  agentic_net:
    external: false

volumes:
  mongodb_data:
  backend_uploads:

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-agentic}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: agentic_ecommerce
    volumes:
      - mongodb_data:/data/db
    networks:
      - agentic_net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    expose:
      - '4000'
    environment:
      NODE_ENV: production
      API_PORT: 4000
      PORT: 4000
      HOST: 0.0.0.0
      MONGODB_URI: mongodb://${MONGO_USERNAME:-agentic}:${MONGO_PASSWORD:-changeme}@mongodb:27017/agentic_ecommerce?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-10y}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-anthropic/claude-3-haiku}
      APP_DOMAIN: ${APP_DOMAIN:-yourdomain.com}
      APP_URL: https://${APP_DOMAIN:-yourdomain.com}
      CORS_ORIGIN: https://${APP_DOMAIN:-yourdomain.com},https://api.${APP_DOMAIN:-yourdomain.com}
      PUBLIC_API_URL: https://api.${APP_DOMAIN:-yourdomain.com}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      LOG_LEVEL: info
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - agentic_net
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${APP_DOMAIN:-yourdomain.com}
        NEXT_PUBLIC_APP_DOMAIN: ${APP_DOMAIN:-yourdomain.com}
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.${APP_DOMAIN:-yourdomain.com}
      NEXT_PUBLIC_APP_DOMAIN: ${APP_DOMAIN:-yourdomain.com}
      INTERNAL_API_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agentic_net
